<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление набора</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/new_card.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="javascript:history.back()" class="back-link">← Назад</a>
            <h1>Готовые наборы</h1>
        </div>

        <div class="sets-grid">
            {% for set in ready_sets %}
            <div class="set-item">
                <div class="image-wrapper">
                    <img src="{{ set.image_path }}" alt="{{ set.name }}"
                         onerror="this.src='/static/img/default_set.png'">
                </div>
                <div class="set-content">
                    <h3>{{ set.name }}</h3>
                    <span class="description">{{ set.description }}</span>
                    <p><form action="{{ url_for('add_set', set_id=set.id) }}" method="POST">
                        <button type="submit" class="add-btn">➕ Добавить</button>
                    </form></p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Набор создан</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="study-container" style="text-align: center;">
        <div style="background-image: url('/static/img/top_pattern_bg.jpg');
                    background-repeat: repeat;
                    padding: 40px;
                    border: 5px dashed #105424;
                    border-radius: 30px;
                    display: inline-block;
                    width: auto;
                    min-width: 300px;">

            <h1>Набор успешно создан!</h1>
            <p>Набор "{{ set_name }}" добавлен в вашу коллекцию.</p>
            <p>Добавлено карточек: {{ cards_count }}</p>

            <div class="nav-buttons" style="justify-content: center; margin-top: 20px;">
                <a href="/user/{{ session.user }}/{{ session.user_id }}" class="main-btn" style="background-color: #006400; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; display: inline-block; font-size: 18px;">Вернуться к моим наборам</a>
            </div>
        </div>
    </div>
</body>
</html>

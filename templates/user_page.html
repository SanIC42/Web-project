<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои наборы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1 class="greeting">Здравствуй, {{ login }}!</h1>

    <div class="section">
        <h2>Мои наборы карточек:</h2>
        {% if card_sets %}
            <ul class="card-list">
                {% for set in card_sets %}
                    <li>
                        <strong>{{ set.name }}</strong>
                        <span>(карточек: {{ set.cards|length }})</span>
                        <a href="/view_set/{{ set.id }}">Открыть</a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty">У тебя пока нет наборов. Добавь готовый набор или создай свой.</p>
        {% endif %}
    </div>

    <div class="section">
        <h2>Добавить новый набор:</h2>
        <a href="/new_card" class="add-card">
            <img src="/static/img/plus.png" alt="Добавить карточки">
        </a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои наборы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user_page.css') }}">
</head>
<body>
    <div class="navbar">
        <h1 class="greeting">Здравствуй, {{ login }}!</h1>
        <a class="logout-btn" href="/logout">Выход</a>
    </div>

    <div class="container">
        <div class="section">
            <h2 class="section-title">Мои наборы карточек</h2>
            {% if card_sets %}
                <div class="sets-grid">
                    {% for set in card_sets %}
                        <div class="set-card">
                            <div class="set-info">
                                <strong>{{ set.name }}</strong>
                                <span class="card-count">Карточек: {{ set.cards|length }}</span>
                            </div>
                            <a href="/view_set/{{ set.id }}" class="open-btn">Открыть</a>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty-state">
                    <p>У тебя пока нет наборов. Добавь готовый набор или создай свой.</p>
                </div>
            {% endif %}
        </div>

        <div class="add-section">
            <h3>Добавить новый набор</h3>
            <a href="/new_card" class="add-btn-circle">
                <span>+</span>
            </a>
        </div>
    </div>
</body>
</html>

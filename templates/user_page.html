<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои наборы карточек</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="greeting-sticker">
            <h1 class="sticker-text orange">Здравствуй, {{ login }}!</h1>
        </div>

        <div class="section">
            <div class="section-header turquoise">
                <h2>Мои карточки:</h2>
            </div>

            <div class="sets-container">
                {% for card_set in card_sets %}
                <a href="/card_set/{{ card_set.id }}">
                    <div class="set-card">
                        <img src="{{ card_set.image_path or '/static/img/sets/default_set.png' }}"
                             alt="{{ card_set.name }}"
                             class="set-image"
                             onerror="this.src='/static/img/sets/default_set.png'">
                        <div class="set-info">
                            <h3 class="set-name">{{ card_set.name }}</h3>
                        </div>
                    </div>
                </a>
                {% else %}
                <p class="empty-message">У тебя пока нет карточек. Добавь готовый набор!</p>
                {% endfor %}
            </div>
        </div>

        <div class="section">
            <div class="section-header lightgreen">
                <h2>Добавить карточки:</h2>
            </div>
            <a href="/new_card" class="add-card">
                <img src="/static/img/plus.png" alt="Добавить карточки">
            </a>
        </div>

        <div class="section">
            <div class="section-header purple">
                <h2>Создать свой набор:</h2>
            </div>
            <form action="/upload_csv" method="POST" enctype="multipart/form-data" class="upload-form">
                <div class="form-group">
                    <input type="text" name="set_name" placeholder="Название набора" class="form-input" required>
                </div>
                <div class="form-group">
                    <input type="file" name="csv_file" accept=".csv" required>
                    <small>Файл CSV (слово;перевод)</small>
                </div>
                <div class="form-group">
                    <input type="file" name="set_image" accept="image/png, image/jpeg, image/jpg">
                    <small>(Необязательно) Картинка для набора 200x280px</small>
                </div>
                <button type="submit" class="btn">Загрузить CSV</button>
            </form>
        </div>

    </div>
</body>
</html>
